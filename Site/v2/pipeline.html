<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pipeline — Activity Board</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="config.js"></script>
</head>
<body class="site-wrapper">
  <a class="skip-link" href="#main">Skip to main content</a>

  <!-- shell:start -->
  <header class="site-header">
    <div class="site-header-bar">
      <a class="site-name" href="index.html" id="site-name">Activity Board</a>
      <button type="button" class="nav-toggle" id="nav-toggle" aria-controls="main-nav" aria-expanded="false" hidden>
        <span class="nav-toggle-icon" aria-hidden="true"></span>
        Menu
      </button>
      <div class="shell-actions">
        <button type="button" id="theme-toggle" class="theme-toggle" aria-pressed="false">
          <span class="theme-toggle-glyph" aria-hidden="true"></span>
          <span class="theme-toggle-label">Dark mode</span>
        </button>
        <div class="shell-user" id="shell-user" hidden>
          <span class="shell-avatar" id="user-avatar" aria-hidden="true"></span>
          <span class="user-name" id="user-name"></span>
          <button type="button" id="sign-out" class="shell-signout" hidden>Sign out</button>
        </div>
      </div>
    </div>
    <nav aria-label="Main navigation" id="main-nav">
      <ul>
        <li><a href="index.html">Board</a></li>
        <li><a href="pipeline.html">Pipeline</a></li>
        <li><a href="outcomes.html">Outcomes</a></li>
        <li><a href="learning.html">Learning</a></li>
        <li><a href="members.html">Members</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="admin.html" id="nav-admin" hidden>Admin</a></li>
      </ul>
    </nav>
  </header>
  <!-- shell:end -->

  <main id="main" class="site-main" tabindex="-1">
    <div class="section-toolbar">
      <h1 id="page-title">Pipeline</h1>
      <a href="new-experiment.html" class="btn btn-secondary" id="new-experiment-link">
        <span aria-hidden="true">+ </span>New experiment
      </a>
    </div>

    <p id="pipeline-intro" class="home-greeting">Every experiment, by stage. Move yours along as it progresses.</p>

    <fieldset class="filter-bar">
      <legend>Show</legend>
      <div class="filter-options">
        <label class="label-inline" for="pipeline-filter-all">
          <input type="radio" name="pipeline-filter" id="pipeline-filter-all" value="all" checked>
          Everyone’s
        </label>
        <label class="label-inline" for="pipeline-filter-mine">
          <input type="radio" name="pipeline-filter" id="pipeline-filter-mine" value="mine">
          Mine
        </label>
      </div>
    </fieldset>

    <p id="pipeline-loading" class="loading">Loading pipeline…</p>

    <div id="pipeline" class="pipeline" hidden></div>
  </main>

  <div role="status" aria-live="polite" id="live-region" class="sr-only"></div>

  <noscript>
    <div class="noscript-notice">
      <p>JavaScript is required to load the pipeline. Navigation and headings work without it, but the board itself requires JS.</p>
    </div>
  </noscript>

  <script type="module" src="js/shell.js"></script>
  <script type="module" src="js/pages/pipeline.js"></script>
</body>
</html>
