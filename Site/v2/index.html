<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Board — Activity Board</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="config.js"></script>
</head>
<body class="site-wrapper">
  <a class="skip-link" href="#main">Skip to main content</a>

  <!-- shell:start -->
  <header class="site-header">
    <a class="site-name" href="index.html" id="site-name">Activity Board</a>
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="index.html">Board</a></li>
        <li><a href="pipeline.html">Pipeline</a></li>
        <li><a href="learning.html">Learning</a></li>
        <li><a href="members.html">Members</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="admin.html" id="nav-admin" hidden>Admin</a></li>
      </ul>
    </nav>
    <div class="shell-actions">
      <button type="button" id="theme-toggle" class="btn-secondary" aria-pressed="false">Dark mode</button>
      <span class="user-name" id="user-name"></span>
      <button type="button" id="sign-out" class="btn-secondary" hidden>Sign out</button>
    </div>
  </header>
  <!-- shell:end -->

  <main id="main" class="site-main">
    <div class="section-toolbar">
      <h1 id="page-title">Board</h1>
      <div class="board-controls" aria-label="Board controls">
        <button type="button" id="refresh-board" class="btn-secondary">Refresh board</button>
        <label class="label-inline">
          <input type="checkbox" id="auto-update">
          Auto-refresh every 60 seconds
        </label>
      </div>
    </div>

    <p id="home-greeting" class="home-greeting"></p>

    <div class="home-grid" id="home-grid">
      <section aria-labelledby="next-steps-heading">
        <h2 id="next-steps-heading">Your next steps</h2>
        <div id="next-steps">
          <p class="loading">Loading…</p>
        </div>
      </section>

      <section aria-labelledby="learning-heading" id="learning-section" hidden>
        <h2 id="learning-heading">Fresh learning</h2>
        <div id="learning-list"></div>
      </section>
    </div>

    <section aria-labelledby="all-activity-heading">
      <h2 id="all-activity-heading">All activity</h2>

      <fieldset class="filter-bar">
        <legend>Filter activities</legend>
        <div class="filter-options">
          <label class="label-inline">
            <input type="radio" name="board-filter" value="all" checked>
            All
          </label>
          <label class="label-inline">
            <input type="radio" name="board-filter" value="mine">
            Mine
          </label>
          <label class="label-inline">
            <input type="radio" name="board-filter" value="active">
            Active
          </label>
          <label class="label-inline">
            <input type="radio" name="board-filter" value="done">
            Completed
          </label>
        </div>
      </fieldset>

      <p id="board-loading" class="loading" hidden>Loading activities…</p>

      <div id="board-sections">
        <p class="loading">Loading activities…</p>
      </div>
    </section>
  </main>

  <div role="status" aria-live="polite" id="live-region" class="sr-only"></div>

  <noscript>
    <div class="noscript-notice">
      <p>JavaScript is required to load activities. Navigation and headings work without it, but the board list requires JS.</p>
    </div>
  </noscript>

  <script type="module" src="js/shell.js"></script>
  <script type="module" src="js/pages/board.js"></script>
</body>
</html>
